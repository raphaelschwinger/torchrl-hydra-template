_target_: src.algorithms.dqn.DQNAlgorithm
# Default values and parameter descriptions: src/algorithms/dqn.py (DQNAlgorithm.__init__)
# `replay_buffer` and `network` are Callable factories defined in dqn.py and are
# not exposed here — to swap them, edit dqn.py or pass a different factory in code.

# Optimisation
lr: 2.5e-4
gamma: 0.99
batch_size: 128
max_grad_norm: 10.0

# Exploration (epsilon-greedy, linear anneal in frames)
eps_start: 1.0
eps_end: 0.05
annealing_frames: 250_000

# Data collection
frames_per_batch: 1_000
init_random_frames: 10_000
max_frames_per_traj: -1

# Learning schedule
num_updates: 100         # gradient updates per collector batch
hard_update_freq: 50     # target net <- online every N gradient steps
