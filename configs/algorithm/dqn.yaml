# @package _global_
# DQN algorithm defaults.
# Composes TorchRL's shipped configs (registered via
# torchrl.trainers.algorithms.configs) into a runnable trainer. Env-specific
# bits (env, transforms, network in/out dims) are wired by an experiment.

defaults:
  - /network@networks.qvalue_network: mlp
  - /model@models.qvalue_model: qvalue
  - /collector@collector: sync
  - /replay_buffer@replay_buffer: base
  - /storage@replay_buffer.storage: lazy_tensor
  - /writer@replay_buffer.writer: round_robin
  - /sampler@replay_buffer.sampler: random
  - /trainer@trainer: dqn
  - /optimizer@optimizer: adam
  - /loss@loss: dqn
  - /target_net_updater@target_net_updater: hard

networks:
  qvalue_network:
    in_features: ${env.obs_dim}
    out_features: ${env.action_dim}
    num_cells: [120, 84]

models:
  qvalue_model:
    in_keys: ["observation"]
    out_keys: ["action_value"]
    action_space: "one-hot"
    network: ${networks.qvalue_network}

loss:
  value_network: ${models.qvalue_model}
  loss_function: l2
  delay_value: true
  action_space: "one-hot"

target_net_updater:
  value_network_update_interval: 50

optimizer:
  lr: 2.5e-4

collector:
  create_env_fn: ${training_env}
  policy: ${models.qvalue_model}
  total_frames: 500_000
  frames_per_batch: 1000
  init_random_frames: 10_000
  _partial_: true

replay_buffer:
  storage:
    max_size: 10_000
    device: cpu
    ndim: 1
  writer:
    compilable: false
  batch_size: 128

trainer:
  collector: ${collector}
  optimizer: ${optimizer}
  replay_buffer: ${replay_buffer}
  target_net_updater: ${target_net_updater}
  loss_module: ${loss}
  value_network: ${models.qvalue_model}
  logger: ${logger}
  total_frames: ${collector.total_frames}
  frame_skip: 1
  clip_grad_norm: true
  clip_norm: 10.0
  progress_bar: true
  seed: ${seed}
  save_trainer_interval: 10000
  log_interval: 10000
  save_trainer_file: null
  optim_steps_per_batch: 100
  eps_init: 1.0
  eps_end: 0.05
  annealing_num_steps: 250_000
  async_collection: false
