# @package _global_
# PongNoFrameskip-v4 with the standard DQN Atari preprocessing pipeline.

defaults:
  - /transform@transform_noop_reset: noop_reset
  - /transform@transform_to_tensor_image: to_tensor_image
  - /transform@transform_grayscale: gray_scale
  - /transform@transform_resize: resize
  - /transform@transform_cat_frames: cat_frames
  - /transform@transform_reward_clipping: reward_clipping
  - /transform@transform_reward_sum: reward_sum
  - /transform@transform_step_counter: step_counter
  - /env@training_env: batched_env
  - /env@training_env.create_env_fn: transformed_env
  - /env@training_env.create_env_fn.base_env: gym
  - /transform@training_env.create_env_fn.transform: compose

env:
  obs_dim: null  # CNN — image observations, no flat obs_dim
  action_dim: 6  # ALE Pong has 6 actions
  action_space: one-hot

transform_noop_reset:
  noops: 30
  random: true

transform_to_tensor_image:
  in_keys: [pixels]
  out_keys: [pixels]

transform_grayscale:
  in_keys: [pixels]
  out_keys: [pixels]

transform_resize:
  w: 84
  h: 84
  in_keys: [pixels]
  out_keys: [pixels]

transform_cat_frames:
  N: 4
  dim: -3
  in_keys: [pixels]
  out_keys: [pixels]

transform_reward_clipping:
  clamp_min: -1.0
  clamp_max: 1.0

transform_reward_sum:
  in_keys: [reward]
  out_keys: [reward_sum]

transform_step_counter:
  max_steps: 4500
  step_count_key: step_count

training_env:
  num_workers: 1
  create_env_fn:
    base_env:
      env_name: PongNoFrameskip-v4
      from_pixels: true
      pixels_only: true
      frame_skip: 4
      categorical_action_encoding: false
    transform:
      transforms:
        - ${transform_noop_reset}
        - ${transform_to_tensor_image}
        - ${transform_grayscale}
        - ${transform_resize}
        - ${transform_cat_frames}
        - ${transform_reward_clipping}
        - ${transform_reward_sum}
        - ${transform_step_counter}
    _partial_: true
