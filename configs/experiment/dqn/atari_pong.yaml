# @package _global_
# DQN on Atari Pong (PongNoFrameskip-v4).
# Mnih et al. (2015) preprocessing + ConvNet+MLP head from src/networks/atari.py.

defaults:
  - override /algorithm: dqn
  - override /environment: atari_pong
  - override /network@networks.qvalue_network: null  # drop default MLP schema for image input
  - override /model@models.qvalue_model: null        # drop default schema for custom model wiring
  - _self_

# Custom CNN architecture for image inputs.
networks:
  qvalue_network:
    _target_: src.networks.atari.AtariCNN
    out_features: ${env.action_dim}
    hidden_features: 512

# Bind the q-value model to image input keys (not "observation").
models:
  qvalue_model:
    _target_: torchrl.trainers.algorithms.configs.modules._make_qvalue_model
    in_keys: [pixels]
    out_keys: [action_value]
    action_space: one-hot
    network: ${networks.qvalue_network}

# Atari-scale hyperparameters (ballpark Mnih 2015; tune as needed).
collector:
  total_frames: 40_000_000
  frames_per_batch: 4
  init_random_frames: 50_000

replay_buffer:
  storage:
    max_size: 1_000_000
  batch_size: 32

optimizer:
  lr: 1e-4

target_net_updater:
  value_network_update_interval: 10_000

trainer:
  total_frames: ${collector.total_frames}
  log_interval: 10_000
  save_trainer_interval: 100_000
  optim_steps_per_batch: 1
  annealing_num_steps: 1_000_000
  eps_init: 1.0
  eps_end: 0.01
  clip_norm: 10.0
