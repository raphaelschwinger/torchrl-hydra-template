# @package _global_
# DQN on CartPole — replicates the torchrl SOTA reference
# (https://github.com/pytorch/rl/blob/main/sota-implementations/dqn/dqn_cartpole.py).
# All algorithm hyperparameters live in src/algorithms/dqn.py;
# only trainer-side settings are overridden here.
defaults:
  - override /algorithm: dqn
  - override /environment: cartpole
  - override /logger: []
  - _self_

trainer:
  total_frames: 500_100
  seed: 42
  accelerator: cpu
  devices: [0]
  num_envs: 1
  log_every_n_steps: 1_000
