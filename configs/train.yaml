# Top-level training config. Override an algorithm + environment, or pull in
# a curated experiment recipe via `experiment=<algo>/<env>`.

defaults:
  - _self_
  - paths: default
  - algorithm: ???
  - environment: ???
  - logger: wandb
  - experiment: null
  - override hydra/job_logging: colorlog
  - override hydra/hydra_logging: colorlog

seed: 42

# Eval-only overrides — set checkpoint to load a trained model with `python -m src.eval`.
checkpoint: null
num_episodes: 10
